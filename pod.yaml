apiVersion: v1
kind: Pod
metadata: 
  name: nginx-with-config
spec:
  containers:
  - name: nginx
    image: nginx:latest
    ports:
    - containerPort: 80

    # Method 1: Environment variables
    env:
    - name: APP_ENV
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_ENV

    - name: USERNAME
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: USERNAME
